<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do App</title>
  <style>
    /* ===== CSS RESET & BASE STYLES ===== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      font-size: 16px;
      line-height: 1.5;
      color: #212121;
    }

    /* ===== CSS CUSTOM PROPERTIES ===== */
    /* Gray-tone palette and spacing variables for easy theme maintenance */
    :root {
      --color-bg: #f5f5f5;
      --color-container: #ffffff;
      --color-border: #e0e0e0;
      --color-text-primary: #212121;
      --color-text-secondary: #616161;
      --color-accent: #9e9e9e;
      --spacing-sm: 12px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --border-radius: 8px;
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    /* ===== CONTAINER STYLES ===== */
    /* Centered container with max-width for desktop, full-width for mobile */
    .container {
      max-width: 600px;
      margin: 40px auto;
      padding: var(--spacing-lg);
      background: var(--color-container);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow);
    }

    /* ===== HEADER STYLES ===== */
    h1 {
      font-size: 32px;
      margin-bottom: var(--spacing-lg);
      text-align: center;
      color: var(--color-text-primary);
      font-weight: 600;
    }

    /* ===== FORM STYLES ===== */
    /* Flexbox layout for input and button side-by-side */
    #todo-form {
      display: flex;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-lg);
    }

    #todo-input {
      flex: 1;
      padding: var(--spacing-md);
      border: 2px solid var(--color-border);
      border-radius: var(--border-radius);
      font-size: 16px;
      color: var(--color-text-primary);
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #todo-input:focus {
      outline: none;
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(158, 158, 158, 0.1);
    }

    #todo-input::placeholder {
      color: var(--color-text-secondary);
    }

    button[type="submit"] {
      padding: var(--spacing-md) var(--spacing-lg);
      background: var(--color-text-primary);
      color: var(--color-container);
      border: none;
      border-radius: var(--border-radius);
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      font-family: inherit;
      min-height: 44px;
      transition: opacity 0.2s, background 0.2s;
    }

    button[type="submit"]:hover {
      opacity: 0.8;
    }

    /* ===== LIST STYLES ===== */
    /* Base list styles - task item styles will be added in FEAT-002 */
    #todo-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    /* ===== TASK ITEM STYLES ===== */
    /* Individual task styling with gray-tone palette */
    .todo-item {
      display: flex;
      align-items: center;
      padding: var(--spacing-md);
      border-bottom: 1px solid var(--color-border);
      background: var(--color-container);
      animation: fadeIn 0.3s ease-out;
      transition: background 0.3s, opacity 0.3s;
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    .todo-text {
      flex: 1;
      color: var(--color-text-primary);
      font-size: 16px;
      word-break: break-word;
      transition: color 0.3s, text-decoration 0.3s;
    }

    /* ===== COMPLETED TASK STYLES ===== */
    /* Visual feedback for completed tasks: gray out with strikethrough */
    .todo-item.completed {
      background: #f0f0f0;
      opacity: 0.7;
    }

    .todo-item.completed .todo-text {
      color: var(--color-accent);
      text-decoration: line-through;
    }

    /* ===== DELETE BUTTON STYLES ===== */
    /* Trash icon button for completed tasks */
    .delete-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
      color: #f44336;
      transition: color 0.2s, transform 0.2s;
      margin-left: var(--spacing-sm);
    }

    .delete-btn:hover {
      color: #d32f2f;
      transform: scale(1.1);
    }

    .delete-btn:focus {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* ===== INTERACTIVE STYLES ===== */
    /* Pointer cursor for clickable task text */
    .todo-item:not(.completed) .todo-text {
      cursor: pointer;
    }

    .todo-item:not(.completed) .todo-text:hover {
      color: var(--color-text-secondary);
    }

    /* ===== ANIMATIONS ===== */
    /* Fade-in animation for new tasks */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== RESPONSIVE LAYOUT ===== */
    /* Mobile-first approach: adjust for smaller screens */
    @media (max-width: 600px) {
      .container {
        margin-top: 0;
        border-radius: 0;
        min-height: 100vh;
        padding: var(--spacing-md);
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <!-- Main container for the to-do app -->
  <div class="container">
    <!-- Header section with app title -->
    <header>
      <h1>To-Do App</h1>
    </header>

    <!-- Form for adding new tasks -->
    <form id="todo-form">
      <input 
        type="text" 
        id="todo-input" 
        placeholder="Add a new task..." 
        required
        aria-label="New task"
      >
      <button type="submit">Add</button>
    </form>

    <!-- Task list section - will be populated dynamically via JavaScript -->
    <ul id="todo-list">
      <!-- Task items will be added here by JavaScript in FEAT-002 -->
    </ul>
  </div>

  <!-- JavaScript functionality for task creation and rendering -->
  <script>
    // ===== LOCALSTORAGE UTILITIES =====
    const STORAGE_KEY = 'todos-app-data';

    /**
     * Loads todos from localStorage
     * @returns {Array} Array of task objects, or empty array if none found
     */
    function loadFromStorage() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : [];
      } catch (error) {
        console.error('Error loading from localStorage:', error);
        return [];
      }
    }

    /**
     * Saves todos to localStorage
     */
    function saveToStorage() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
      } catch (error) {
        console.error('Error saving to localStorage:', error);
        // Handle quota exceeded or localStorage disabled
        if (error.name === 'QuotaExceededError') {
          console.warn('localStorage quota exceeded. Consider clearing old data.');
        }
      }
    }

    // ===== STATE MANAGEMENT =====
    // Load initial todos from localStorage
    let todos = loadFromStorage();

    // ===== DOM ELEMENT REFERENCES =====
    const todoForm = document.getElementById('todo-form');
    const todoInput = document.getElementById('todo-input');
    const todoList = document.getElementById('todo-list');

    // ===== TASK CREATION FUNCTIONS =====
    /**
     * Creates a new task object
     * @param {string} text - The task description
     * @returns {object} Task object with id, text, completed
     */
    function createTask(text) {
      return {
        id: Date.now().toString(),
        text: text.trim(),
        completed: false
      };
    }

    /**
     * Adds a new task to the todos array
     * @param {string} text - The task description
     */
    function addTask(text) {
      if (!text || text.trim() === '') {
        return; // Prevent empty tasks
      }
      const task = createTask(text);
      todos.push(task);
      saveToStorage(); // Persist to localStorage
      renderTasks(); // Update the UI
    }

    /**
     * Toggles the completion status of a task
     * @param {string} taskId - The ID of the task to toggle
     */
    function toggleTask(taskId) {
      const task = todos.find(t => t.id === taskId);
      if (task) {
        task.completed = !task.completed;
        saveToStorage(); // Persist to localStorage
        renderTasks(); // Re-render to show updated state
      }
    }

    /**
     * Deletes a task permanently
     * @param {string} taskId - The ID of the task to delete
     */
    function deleteTask(taskId) {
      todos = todos.filter(t => t.id !== taskId);
      saveToStorage(); // Persist to localStorage
      renderTasks(); // Re-render to remove deleted task
    }

    // ===== RENDERING FUNCTIONS =====
    /**
     * Creates the HTML element for a single task
     * @param {object} task - The task object to render
     * @returns {HTMLElement} The list item element
     */
    function createTaskElement(task) {
      const li = document.createElement('li');
      li.className = 'todo-item';
      if (task.completed) {
        li.classList.add('completed');
      }
      li.dataset.id = task.id;
      
      // Task text span with click handler for toggling
      const textSpan = document.createElement('span');
      textSpan.className = 'todo-text';
      textSpan.textContent = task.text;
      textSpan.style.cursor = 'pointer';
      textSpan.addEventListener('click', () => toggleTask(task.id));
      
      li.appendChild(textSpan);
      
      // Add delete button only if task is completed
      if (task.completed) {
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = '🗑️';
        deleteBtn.setAttribute('aria-label', 'Delete task');
        deleteBtn.addEventListener('click', (e) => {
          e.stopPropagation(); // Prevent li click event
          deleteTask(task.id);
        });
        
        li.appendChild(deleteBtn);
      }
      
      return li;
    }

    /**
     * Renders all tasks to the DOM
     * Clears the list and re-renders from the todos array
     */
    function renderTasks() {
      // Clear existing tasks
      todoList.innerHTML = '';
      
      // Render each task
      todos.forEach(task => {
        const taskElement = createTaskElement(task);
        todoList.appendChild(taskElement);
      });
    }

    // ===== EVENT HANDLERS =====
    /**
     * Handles form submission for creating new tasks
     * @param {Event} e - The form submit event
     */
    function handleFormSubmit(e) {
      e.preventDefault(); // Prevent page reload
      
      const text = todoInput.value;
      addTask(text);
      
      todoInput.value = ''; // Clear input field
      todoInput.focus();    // Keep focus for next entry
    }

    // ===== INITIALIZATION =====
    // Initialize event listeners when DOM is ready
    todoForm.addEventListener('submit', handleFormSubmit);

    // Render initial tasks from localStorage
    renderTasks();
  </script>
</body>
</html>
